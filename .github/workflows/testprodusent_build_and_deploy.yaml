name: "Testprodusent: build and deploy"
on:
  push:
    branches:
      - main
    paths:
      - test-produsent/**
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'


jobs:
  build_and_push:
    permissions:
      contents: "read"
      id-token: "write"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: test-produsent/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: test-produsent

      - run: pnpm build
        working-directory: test-produsent

      - uses: nais/docker-build-push@v0
        id: docker-push
        with:
          team: fager
          docker_context: test-produsent/
          dockerfile: test-produsent/Dockerfile
          image_suffix: test-produsent
          tag: ${{ github.sha }}

      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: test-produsent/nais-application.yaml
          PRINT_PAYLOAD: true
          VAR: commit=${{ github.sha }},image=${{ steps.docker-push.outputs.image }}
