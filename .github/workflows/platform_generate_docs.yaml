name: "Platform: verify docs"
on:
  push:
    branches:
      - main
    paths:
      - app/src/main/resources/produsent.graphql
      - docs/**
  pull_request:
    paths:
      - app/src/main/resources/produsent.graphql
      - docs/**

jobs:
  verify-docs:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: docs/pnpm-lock.yaml

      - working-directory: ./docs
        run: pnpm install --frozen-lockfile

      - working-directory: ./docs
        run: pnpm run update-gqldoc

      - name: Verify docs are up to date
        working-directory: ./docs
        run: |
          if ! git diff --exit-code api.html; then
            echo ""
            echo "========================================="
            echo "ERROR: api.html is out of date."
            echo "Run 'pnpm run update-gqldoc' in the docs/ directory and commit the result."
            echo "========================================="
            exit 1
          fi
