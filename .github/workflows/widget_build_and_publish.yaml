name: "Widget: build and publish"
on:
  push:
    paths:
      - 'widget/**'
      - 'app/src/main/resources/bruker.graphql'
  workflow_dispatch:

jobs:
  component:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'pnpm'
          cache-dependency-path: widget/component/pnpm-lock.yaml

      - name: install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: widget/component
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: build
        run: |
          pnpm run setup
          pnpm run build
        working-directory: widget/component
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: test
        run: pnpm test
        working-directory: widget/component

      - if: github.ref == 'refs/heads/main'
        name: publish on github
        run: |
          if jq --null-input --exit-status \
              --argjson local "$(jq .version package.json)" \
              --argjson published "$(npm view --json @navikt/arbeidsgiver-notifikasjon-widget versions)" \
              '$published | map(. == $local) | any'
          then
              echo "Version already published. Nothing to do."
          else
              pnpm publish --access public --no-git-checks
          fi
        working-directory: widget/component
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  brukerapi-mock:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'pnpm'
          cache-dependency-path: widget/component/mock/pnpm-lock.yaml

      - name: build
        run: pnpm run setup
        working-directory: widget/component/mock

      - if: github.ref == 'refs/heads/main'
        name: publish on github
        run: |
          if jq --null-input --exit-status \
              --argjson local "$(jq .version package.json)" \
              --argjson published "$(npm view --json @navikt/arbeidsgiver-notifikasjoner-brukerapi-mock versions)" \
              '$published | map(. == $local) | any'
          then
              echo "Version already published. Nothing to do."
          else
              pnpm publish --access public --no-git-checks
          fi
        working-directory: widget/component/mock
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

